<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>The Geek Shop | Kinetic Laboratory</title>
  <link rel="icon" type="image/x-icon" href="logo t.png"> 
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .shimmer {
      background: linear-gradient(90deg, #191f2f 25%, #2e3545 50%, #191f2f 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite linear;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #0c1322; 
      color: #dce2f7; 
      overflow-x: hidden;
    }
    h1, h2, h3, .headline { font-family: 'Space Grotesk', sans-serif; }
    
    .cart-slider {
      transition: transform 0.3s ease-in-out;
    }
    .modal {
      display: none;
      background-color: rgba(7, 14, 29, 0.8);
      backdrop-filter: blur(12px);
    }
    .modal.active {
      display: flex;
    }
    
    /* Hide scrollbar for the sticky sidebar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container": "#191f2f",
            "surface-variant": "#2e3545",
            "surface-container-low": "#141b2b",
            "on-primary-fixed": "#29074a",
            "surface-container-highest": "#2e3545",
            "surface": "#0c1322",
            "primary-container": "#d8b4fe",
            "surface-container-high": "#232a3a",
            "background": "#0c1322",
            "on-surface": "#dce2f7",
            "primary": "#ecd7ff",
            "on-background": "#dce2f7",
            "on-surface-variant": "#cdc3d0",
            "outline": "#968e9a",
            "outline-variant": "#4a454f"
          },
          "fontFamily": {
            "headline": ["Space Grotesk"],
            "body": ["Inter"]
          }
        }
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
    import { getAuth } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';
  </script>
  <script type="module" src="script.js"></script>
</head>

<body class="bg-background selection:bg-primary/30">

  <header class="bg-[#0c1322]/60 backdrop-blur-xl top-0 sticky z-50 border-b border-white/5">
    <div class="flex justify-between items-center px-8 py-4 w-full max-w-screen-2xl mx-auto">
      <a href="index.html" class="flex items-center gap-2 text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-purple-200 to-purple-400 font-['Space_Grotesk']">
        <img src="logo.png" alt="The Geek Shop Logo" class="h-10 object-contain inline-block">
        <span>The Geek Shop</span>
      </a>
      <nav class="hidden md:flex items-center space-x-8 font-['Space_Grotesk'] tracking-tight">
        <a class="text-purple-300 border-b-2 border-purple-400 pb-1" href="products.html">Products</a>
        <a class="text-slate-400 hover:text-purple-200 transition-colors" href="status.html">Order Status</a>
      </nav>
      <div class="flex items-center gap-6">
        <div class="hidden lg:flex items-center bg-surface-container-low px-4 py-2 rounded-xl border border-white/5">
          <span class="material-symbols-outlined text-slate-500 mr-2">search</span>
          <input id="global-search-input" class="bg-transparent border-none focus:ring-0 text-sm w-48 text-on-surface placeholder-slate-500" placeholder="Search products..." type="text"/>
        </div>
        <div class="flex items-center gap-4 text-purple-300">
          <button id="cart-link" class="active:scale-95 duration-150 relative p-1">
            <span class="material-symbols-outlined text-2xl">shopping_cart</span>
            <span id="cart-count" class="absolute -top-1 -right-2 bg-purple-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border border-[#0c1322]">0</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-screen-2xl mx-auto px-8 py-12 relative">
    
    <div class="flex flex-col-reverse md:flex-row gap-12 items-start">
      
      <div class="flex-1 w-full">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
          <div>
            <span class="text-primary font-bold tracking-[0.2em] uppercase text-xs">Catalog.V2</span>
            <h1 class="text-5xl font-extrabold tracking-tighter mt-2 bg-clip-text text-transparent bg-gradient-to-r from-on-surface to-on-surface-variant">The Inventory</h1>
            <p id="results-count" class="text-sm text-outline mt-2 hidden">Found 0 products</p>
          </div>
          <div class="flex items-center gap-4 text-sm text-outline">
            <select id="sort-select" class="bg-transparent border-none focus:ring-0 text-on-surface font-bold p-0 cursor-pointer">
              <option value="latest" class="bg-surface-container">Latest Arrivals</option>
              <option value="price-low" class="bg-surface-container">Price: Low-High</option>
              <option value="price-high" class="bg-surface-container">Price: High-Low</option>
            </select>
          </div>
        </header>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 min-h-[50vh]">
          <div class="bg-surface-container-low rounded-xl overflow-hidden dynamic-shimmer-placeholder border border-white/5">
            <div class="aspect-[4/5] shimmer opacity-20"></div>
            <div class="p-6 space-y-4">
              <div class="flex justify-between"><div class="h-6 w-32 shimmer rounded-lg opacity-20"></div><div class="h-6 w-16 shimmer rounded-lg opacity-20"></div></div>
              <div class="h-4 w-full shimmer rounded-lg opacity-10"></div>
              <div class="h-4 w-2/3 shimmer rounded-lg opacity-10"></div>
            </div>
          </div>
          <div class="bg-surface-container-low rounded-xl overflow-hidden dynamic-shimmer-placeholder border border-white/5">
            <div class="aspect-[4/5] shimmer opacity-20"></div>
            <div class="p-6 space-y-4">
              <div class="flex justify-between"><div class="h-6 w-32 shimmer rounded-lg opacity-20"></div><div class="h-6 w-16 shimmer rounded-lg opacity-20"></div></div>
              <div class="h-4 w-full shimmer rounded-lg opacity-10"></div>
              <div class="h-4 w-2/3 shimmer rounded-lg opacity-10"></div>
            </div>
          </div>
          <div class="bg-surface-container-low rounded-xl overflow-hidden dynamic-shimmer-placeholder border border-white/5">
            <div class="aspect-[4/5] shimmer opacity-20"></div>
            <div class="p-6 space-y-4">
              <div class="flex justify-between"><div class="h-6 w-32 shimmer rounded-lg opacity-20"></div><div class="h-6 w-16 shimmer rounded-lg opacity-20"></div></div>
              <div class="h-4 w-full shimmer rounded-lg opacity-10"></div>
              <div class="h-4 w-2/3 shimmer rounded-lg opacity-10"></div>
            </div>
          </div>
        </div>

        <div id="pagination-container" class="mt-20 flex justify-center items-center gap-2 flex-wrap">
          </div>
      </div>

      <aside class="w-full md:w-72 flex-shrink-0 space-y-10 md:sticky md:top-28 md:max-h-[calc(100vh-8rem)] overflow-y-auto no-scrollbar pb-10">
        <div class="bg-surface-container p-6 rounded-2xl border border-white/5 shadow-xl">
          <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-primary mb-6 flex items-center justify-between">
            Laboratory Filters
            <button id="reset-filters" class="text-[9px] bg-white/5 hover:bg-white/10 px-2 py-1 rounded transition-colors text-outline">RESET</button>
          </h2>
          
          <div class="relative mb-10">
            <input id="sidebar-search-input" class="w-full bg-surface-container-lowest border border-white/5 rounded-xl px-4 py-3 text-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant text-on-surface" placeholder="Search components..." type="text"/>
            <span class="material-symbols-outlined absolute right-3 top-3.5 text-outline-variant text-[20px]">search</span>
          </div>
          
          <div class="space-y-8">
            <div>
              <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] uppercase tracking-widest text-outline block">Price Orbit</span>
                <span id="price-display" class="text-xs font-bold text-primary">Up to ৳50,000</span>
              </div>
              <div class="relative h-2 bg-surface-container-highest rounded-full flex items-center">
                <div id="price-progress" class="absolute left-0 h-full bg-primary-container rounded-full w-full pointer-events-none"></div>
                <input type="range" id="price-slider" min="0" max="50000" step="500" value="50000" class="absolute w-full h-full opacity-0 cursor-pointer z-10">
              </div>
            </div>

            <div>
              <span class="text-[10px] uppercase tracking-widest text-outline block mb-4">Core Inventory</span>
              <div id="category-filters-container" class="space-y-3">
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" value="Keyboards" class="category-checkbox rounded border-white/10 bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-surface">
                  <span class="text-sm text-on-surface-variant group-hover:text-white transition-colors">Keyboards</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" value="Switches" class="category-checkbox rounded border-white/10 bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-surface">
                  <span class="text-sm text-on-surface-variant group-hover:text-white transition-colors">Switches</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" value="Keycaps" class="category-checkbox rounded border-white/10 bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-surface">
                  <span class="text-sm text-on-surface-variant group-hover:text-white transition-colors">Keycaps</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" value="Accessories" class="category-checkbox rounded border-white/10 bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-surface">
                  <span class="text-sm text-on-surface-variant group-hover:text-white transition-colors">Accessories</span>
                </label>
              </div>
            </div>
            
            <div>
              <span class="text-[10px] uppercase tracking-widest text-outline block mb-4">Form Factor</span>
              <div class="grid grid-cols-2 gap-2" id="form-factor-container">
                <button data-factor="ALL" class="form-factor-btn bg-primary/20 text-primary border border-primary/30 text-[10px] font-bold py-2 rounded-xl transition-all">ALL</button>
                <button data-factor="60%" class="form-factor-btn bg-surface-container-low text-on-surface-variant border border-transparent text-[10px] font-bold py-2 rounded-xl hover:bg-surface-container-high transition-all">60%</button>
                <button data-factor="75%" class="form-factor-btn bg-surface-container-low text-on-surface-variant border border-transparent text-[10px] font-bold py-2 rounded-xl hover:bg-surface-container-high transition-all">75%</button>
                <button data-factor="TKL" class="form-factor-btn bg-surface-container-low text-on-surface-variant border border-transparent text-[10px] font-bold py-2 rounded-xl hover:bg-surface-container-high transition-all">TKL</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </main>

  </body>
</html>
